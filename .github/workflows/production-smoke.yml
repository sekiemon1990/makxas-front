name: Production smoke tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test"
        required: false
        default: "https://makxas-front.vercel.app"
  deployment_status:

permissions:
  contents: read

concurrency:
  group: production-smoke-${{ github.event_name == 'deployment_status' && github.event.deployment.id || github.run_id }}
  cancel-in-progress: false

jobs:
  smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'deployment_status' &&
        github.event.deployment_status.state == 'success' &&
        (
          github.event.deployment.environment == 'Production' ||
          github.event.deployment.environment == 'production'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://makxas-front.vercel.app' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run smoke tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7
